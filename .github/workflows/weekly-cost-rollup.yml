# Weekly Cost Rollup Workflow
# Aggregates budget and cost data from issues updated in the past week

name: "Weekly Cost Rollup"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 18 * * 0'  # 6 PM UTC every Sunday
  workflow_dispatch:

permissions:
  issues: write

jobs:
  weekly-cost-rollup:
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate weekly cost and budget
        uses: actions/github-script@d7906e4ad0b1822421a7e6a35d5ca353c962f410 # v6
        with:
          script: |
            const now = new Date();

            // ISO week key (YYYY-WXX) for idempotency — prevents duplicate issues on reruns
            const d = new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            const weekNum = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            const weekKey = `${d.getUTCFullYear()}-W${String(weekNum).padStart(2, '0')}`;
            const rollupTitle = `Weekly Cost Rollup (${weekKey})`;

            // Skip if a rollup for this week already exists
            const existingRollups = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'all',
                labels: 'cost:rollup',
                per_page: 100
              }
            );
            const alreadyExists = existingRollups.some(issue => issue.title === rollupTitle);
            if (alreadyExists) {
              console.log(`Rollup for ${weekKey} already exists — skipping.`);
              return;
            }

            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'all',
                per_page: 100
              }
            );
            const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
            const updatedIssues = issues.filter(issue => new Date(issue.updated_at) > weekAgo);
            let totalHours = 0;
            let totalCost = 0;
            let overruns = [];
            updatedIssues.forEach(issue => {
              if (issue.body) {
                const match = issue.body.match(/Budget: (\d+)h, £(\d+)/);
                if (match) {
                  const hours = parseInt(match[1], 10);
                  const cost = parseInt(match[2], 10);
                  totalHours += hours;
                  totalCost += cost;
                  if (cost > 100) { // Example overrun threshold
                    overruns.push(`#${issue.number}: £${cost}`);
                  }
                }
              }
            });
            let body = `## Weekly Cost Rollup\n`;
            body += `\nTotal Hours: ${totalHours}\nTotal Cost: £${totalCost}\n`;
            if (overruns.length) {
              body += `\n### Budget Overruns\n` + overruns.join('\n');
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: rollupTitle,
              body,
              labels: ['state:report', 'cost:rollup']
            });
